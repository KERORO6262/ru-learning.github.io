<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>俄語 33 字母點按發音</title>

  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>

<body>
  <div class="wrap">
    <h1>俄語 33 字母學習站</h1>
    <p class="subtitle">點按字母即可播放「字母名稱讀法」。</p>

    <nav class="panel quickNav" aria-label="快速導覽">
      <a href="#quizSection">測驗</a>
      <a href="#vocabSection">單字</a>
      <a href="#grammarSection">文法</a>
    </nav>

    <section class="panel" aria-label="controls">
      <div class="row">
        <label for="voiceSelect">語音（優先 ru-RU）</label>
        <select id="voiceSelect"></select>

        <button id="reloadVoicesBtn" type="button">重新載入語音</button>
        <button id="stopBtn" type="button">停止</button>

        <span class="tag" id="statusTag">準備中</span>
      </div>

      <div class="row">
        <label for="rate">語速</label>
        <select id="rate">
          <option value="0.85">慢</option>
          <option value="1" selected>正常</option>
          <option value="1.15">快</option>
        </select>

        <label for="pitch">音高</label>
        <select id="pitch">
          <option value="0.95">低</option>
          <option value="1" selected>正常</option>
          <option value="1.08">高</option>
        </select>

        <button id="testBtn" type="button">測試：Привет</button>
      </div>

      <p class="small">若沒聲音，先重新載入語音，或到系統語音設定下載俄語語音。</p>
    </section>

    <section id="quizSection" class="panel" aria-label="字母挑戰測驗">
      <h2>字母挑戰測驗</h2>
      <div class="row">
        <label for="quizMode">出題模式</label>
        <select id="quizMode">
          <option value="letter_to_hint" selected>看字母選英文讀音</option>
          <option value="hint_to_letter">看英文讀音選字母</option>
        </select>
        <button id="nextQuizBtn" type="button">更換題目</button>
      </div>
      <p class="small" id="quizHelp">看到字母後，選出正確英文讀音。</p>
      <div class="quizPrompt" id="quizPrompt">--</div>
      <div class="quizOptions" id="quizOptions"></div>
      <p class="small" id="quizFeedback">請選擇答案。</p>
    </section>

    <section class="grid" id="lettersGrid" aria-label="letters grid"></section>

    <section id="vocabSection" class="panel" aria-label="基礎單字">
      <h2>基礎單字</h2>
      <div class="vocabGrid" id="vocabGrid"></div>
    </section>

    <section id="grammarSection" class="panel" aria-label="文法基礎">
      <h2>文法基礎</h2>
      <div id="grammarList" class="grammarList"></div>
    </section>
  </div>

  <script defer src="./js/data/letters.js"></script>
  <script defer src="./js/data/vocab.js"></script>
  <script defer src="./js/core/tts.js"></script>
  <script defer src="./js/ui/ui.js"></script>
  <script defer src="./js/main.js"></script>
</body>
</html>
