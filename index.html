<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Russian Learning Web App</title>
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>
<body>
  <header class="topbar">
    <h1>Russian Learning Web App</h1>
    <nav class="nav" aria-label="Main navigation">
      <button class="nav-btn active" data-section="quiz" type="button">Quiz</button>
      <button class="nav-btn" data-section="vocabulary" type="button">Vocabulary</button>
      <button class="nav-btn" data-section="grammar" type="button">Grammar</button>
    </nav>
  </header>

  <main class="container">
    <section id="quiz" class="content-section active" aria-label="Letter challenge quiz">
      <div class="panel">
        <h2>Letter Challenge</h2>
        <p>Identify the correct Cyrillic letter name/sound.</p>
        <div class="quiz-letter" id="quizLetter">А а</div>
        <p id="quizPrompt" class="prompt">Which name/sound matches this letter?</p>
        <div id="quizOptions" class="options"></div>
        <div id="quizFeedback" class="feedback" role="status" aria-live="polite"></div>
      </div>
    </section>

    <section id="vocabulary" class="content-section" aria-label="Vocabulary trainer">
      <div class="panel">
        <h2>Vocabulary Trainer</h2>
        <p>Tap a flashcard to reveal pronunciation and meaning.</p>
        <div id="vocabGrid" class="vocab-grid"></div>
      </div>
    </section>

    <section id="grammar" class="content-section" aria-label="Grammar guide">
      <div class="panel">
        <h2>Grammar Guide</h2>
        <div id="grammarList" class="grammar-list"></div>
      </div>
    </section>
  </main>

  <script defer src="./js/main.js"></script>
</body>
</html>
