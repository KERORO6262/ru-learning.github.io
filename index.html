<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>俄語 33 字母點按發音</title>

  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>

<body>
  <div class="wrap">
    <header class="topBar">
      <h1>俄語 33 字母學習站</h1>
      <div class="themeSwitch" aria-label="主題切換">
        <label for="themeSelect" class="themeSwitchLabel">主題</label>
        <select id="themeSelect">
          <option value="system" selected>系統預設</option>
          <option value="light">淡色</option>
          <option value="dark">暗色</option>
        </select>
      </div>
    </header>
    <p class="subtitle">點按字母即可播放「字母名稱讀法」。</p>

    <nav class="panel quickNav" aria-label="快速導覽">
      <a href="#lettersSection" class="active">首頁</a>
      <a href="#quizSection">測驗</a>
      <a href="#vocabSection">單字</a>
      <a href="#grammarSection">文法</a>
    </nav>

    <section class="panel" aria-label="controls">
      <div class="row">
        <label for="voiceSelect">語音（優先 ru-RU）</label>
        <select id="voiceSelect"></select>

        <button id="reloadVoicesBtn" type="button">重新載入語音</button>
        <button id="stopBtn" type="button">停止</button>

        <span class="tag" id="statusTag">準備中</span>
      </div>

      <div class="row">
        <label for="rate">語速</label>
        <select id="rate">
          <option value="0.85">慢</option>
          <option value="1" selected>正常</option>
          <option value="1.15">快</option>
        </select>

        <label for="pitch">音高</label>
        <select id="pitch">
          <option value="0.95">低</option>
          <option value="1" selected>正常</option>
          <option value="1.08">高</option>
        </select>

        <button id="testBtn" type="button">測試：Привет</button>
      </div>

      <p class="small">若沒聲音，先重新載入語音，或到系統語音設定下載俄語語音。</p>
    </section>

    <section id="lettersSection" class="panel tab-content active" aria-label="letters view">
      <h2>字母首頁</h2>
      <section class="grid" id="lettersGrid" aria-label="letters grid"></section>
    </section>

    <section id="quizSection" class="panel tab-content hidden" aria-label="字母挑戰測驗">
      <h2>測驗</h2>
      <div class="row">
        <label for="quizMode">出題模式</label>
        <select id="quizMode">
          <option value="letter_to_hint" selected>看字母選英文讀音</option>
          <option value="hint_to_letter">看英文讀音選字母</option>
        </select>
        <button id="quizPlayPromptBtn" type="button">播放題目發音</button>
        <button id="nextQuizBtn" type="button">更換題目</button>
        <button id="quizTimedScoreBtn" type="button">開始 1分30秒計分</button>
        <button id="quizResetScoreBtn" type="button">重置分數</button>
        <button id="quizHistoryBtn" type="button">答題歷史</button>
      </div>
      <div class="row quizStats" aria-label="測驗統計">
        <span class="tag">分數：<strong id="quizScore">0</strong></span>
        <span class="tag">連續答對：<strong id="quizStreak">0</strong></span>
        <span class="tag" id="quizTimedStatus">限時計分：未開始</span>
      </div>
      <p class="small" id="quizHelp">看到字母後，選出正確英文讀音。</p>
      <div class="quizPrompt" id="quizPrompt">--</div>
      <div class="quizOptions" id="quizOptions"></div>
      <p class="small" id="quizFeedback">請選擇答案。</p>
    </section>

    <dialog id="quizHistoryDialog" class="historyDialog" aria-label="答題歷史">
      <form method="dialog" class="historyDialogBody">
        <div class="historyDialogHeader">
          <h3>答題歷史</h3>
          <button type="submit">關閉</button>
        </div>
        <div class="row">
          <label for="quizHistoryLimit">顯示筆數</label>
          <input id="quizHistoryLimit" type="number" min="1" max="200" step="1" value="20" />
          <button id="quizHistoryApplyBtn" type="button">套用</button>
          <button id="quizHistoryClearBtn" type="button">清除紀錄</button>
        </div>
        <div id="quizHistoryList" class="historyList"></div>
      </form>
    </dialog>

    <section id="vocabSection" class="panel tab-content hidden" aria-label="基礎單字">
      <h2>單字</h2>
      <div class="vocabGrid" id="vocabGrid"></div>
    </section>

    <section id="grammarSection" class="panel tab-content hidden" aria-label="文法基礎">
      <h2>文法</h2>
      <div id="grammarList" class="grammarList"></div>
    </section>
    <p class="small siteFootnote">這是我為了學俄語製作的小網頁，歡迎也逛逛我的主網站：<a href="https://keroro6262.github.io/" target="_blank" rel="noopener noreferrer">https://keroro6262.github.io/</a></p>
  </div>

  <script defer src="./js/data/letters.js"></script>
  <script defer src="./js/data/vocab.js"></script>
  <script defer src="./js/core/tts.js"></script>
  <script defer src="./js/ui/ui.js"></script>
  <script defer src="./js/main.js"></script>
</body>
</html>
